name: Update Stock Financials

on:
  schedule:
    - cron: '30 1 * * 1'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-financials:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch quarterly financials and build financials.json
        run: node scripts/fetch-financials.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add financials.json
          git diff --cached --quiet || git commit -m "Update stock financials $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
