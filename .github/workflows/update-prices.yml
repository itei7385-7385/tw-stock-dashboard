name: Update Stock Prices

on:
  schedule:
    - cron: '20 6 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch historical daily prices and build prices.json
        run: node scripts/fetch-prices.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          git diff --cached --quiet || git commit -m "Update stock prices $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && break
            echo "Push failed, retrying ($i/5)..."
            sleep $((RANDOM % 10 + 1))
          done
