name: Update Stock Prices

on:
  schedule:
    # 台灣時間 14:20（收盤後），對應 UTC 06:20
    - cron: '20 6 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch historical daily prices and build prices.json
        run: node scripts/fetch-prices.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          git diff --cached --quiet || git commit -m "Update stock prices $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
