name: Update TWSE Daily Data

on:
  schedule:
    - cron: '10 6 * * 1-5'
    - cron: '10 1 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch TWSE daily data
        run: |
          curl -sL "https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL" -o data.json
          node -e "const d = require('./data.json'); if(!Array.isArray(d) || d.length === 0) process.exit(1);"

      - name: Add updatedAt timestamp
        run: |
          node -e "
            const fs = require('fs');
            const rows = require('./data.json');
            const out = { updatedAt: new Date().toISOString(), rows };
            fs.writeFileSync('data.json', JSON.stringify(out));
          "

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "Update TWSE daily data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
