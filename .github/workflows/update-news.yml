name: Update Stock News

on:
  schedule:
    - cron: '30 0 * * 1-5'
    - cron: '30 4 * * 1-5'
    - cron: '30 10 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch news per stock and build news.json
        run: node scripts/fetch-news.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          git diff --cached --quiet || git commit -m "Update stock news $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
